kind = "web"
previewPath = "/"
title = "كُتَّاب الرحمن"
version = "1.0.0"
id = "artifacts/kuttab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20581

[services.development]
run = "pnpm --filter @workspace/kuttab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kuttab", "run", "build" ]
publicDir = "artifacts/kuttab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20581"
BASE_PATH = "/"
